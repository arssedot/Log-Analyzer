<!DOCTYPE html>
<script>
    (function() {
        const saved = localStorage.getItem('la-theme') || 'dark';
        document.documentElement.setAttribute('data-bs-theme', saved);
    })();
</script>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Register — Log Analyzer</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <style>
        [data-bs-theme="dark"] {
            --bg-base:    #0d1117;
            --bg-surface: #161b22;
            --border:     #30363d;
            --text-muted: #8b949e;
        }
        [data-bs-theme="light"] {
            --bg-base:    #f6f8fa;
            --bg-surface: #ffffff;
            --border:     #d0d7de;
            --text-muted: #656d76;
        }

        html, body { height: 100%; }
        body {
            background: var(--bg-base);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        .auth-card {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 2.5rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 32px rgba(0,0,0,.2);
        }

        .brand-logo { font-size: 2rem; }
        .brand-name  { font-size: 1.4rem; font-weight: 700; }

        .form-control {
            background: var(--bg-base);
            border-color: var(--border);
        }
        .form-control:focus {
            background: var(--bg-base);
            border-color: #58a6ff;
            box-shadow: 0 0 0 .2rem rgba(88,166,255,.2);
        }
        .form-label { font-size: .875rem; color: var(--text-muted); }

        .password-hint { font-size: .75rem; color: var(--text-muted); margin-top: .25rem; }
        .theme-toggle-wrap { position: absolute; top: 1rem; right: 1rem; }
    </style>
</head>
<body>

<!-- Theme toggle -->
<div class="theme-toggle-wrap d-flex align-items-center gap-2">
    <i class="bi bi-moon-stars-fill small"></i>
    <div class="form-check form-switch mb-0">
        <input class="form-check-input" type="checkbox" id="themeToggle" onchange="toggleTheme(this)"/>
    </div>
    <i class="bi bi-sun-fill small text-warning"></i>
</div>

<div class="auth-card">
    <!-- Logo -->
    <div class="text-center mb-4">
        <div class="brand-logo">📊</div>
        <div class="brand-name mt-1">Log Analyzer</div>
        <div class="text-muted small mt-1">Create your account</div>
    </div>

    <!-- Error message -->
    <div th:if="${error}" class="alert alert-danger py-2 small" th:text="${error}"></div>

    <!-- Register form -->
    <form th:action="@{/register}" method="post" id="registerForm">
        <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" id="email" name="email"
                   class="form-control" placeholder="you@example.com"
                   autocomplete="email" required autofocus/>
        </div>
        <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input type="password" id="password" name="password"
                   class="form-control" placeholder="••••••••"
                   autocomplete="new-password" minlength="6" required/>
            <div class="password-hint">Minimum 6 characters</div>
        </div>
        <div class="mb-4">
            <label for="passwordConfirm" class="form-label">Confirm Password</label>
            <input type="password" id="passwordConfirm" name="passwordConfirm"
                   class="form-control" placeholder="••••••••"
                   autocomplete="new-password" required/>
        </div>
        <button type="submit" class="btn btn-primary w-100">
            <i class="bi bi-person-plus me-1"></i>Create Account
        </button>
    </form>

    <hr class="my-4" style="border-color: var(--border);"/>

    <div class="text-center small text-muted">
        Already have an account?
        <a th:href="@{/login}" class="text-decoration-none">Sign in</a>
    </div>
</div>

<script>
    (function() {
        document.getElementById('themeToggle').checked =
            document.documentElement.getAttribute('data-bs-theme') === 'light';
    })();

    function toggleTheme(cb) {
        const theme = cb.checked ? 'light' : 'dark';
        document.documentElement.setAttribute('data-bs-theme', theme);
        localStorage.setItem('la-theme', theme);
    }

    // Client-side password match validation
    document.getElementById('registerForm').addEventListener('submit', function(e) {
        const pw  = document.getElementById('password').value;
        const pw2 = document.getElementById('passwordConfirm').value;
        if (pw !== pw2) {
            e.preventDefault();
            alert('Passwords do not match.');
        }
    });
</script>
</body>
</html>
