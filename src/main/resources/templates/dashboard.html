<!DOCTYPE html>
<!-- Theme is applied before CSS loads to prevent flash -->
<script>
    (function() {
        const saved = localStorage.getItem('la-theme') || 'dark';
        document.documentElement.setAttribute('data-bs-theme', saved);
    })();
</script>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Log Analyzer</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <style>
        /* ── Dark theme ─────────────────────────────── */
        [data-bs-theme="dark"] {
            --bg-base:    #0d1117;
            --bg-surface: #161b22;
            --bg-raised:  #21262d;
            --border:     #30363d;
            --text:       #e6edf3;
            --text-muted: #8b949e;
            --accent:     #58a6ff;
        }

        /* ── Light theme ────────────────────────────── */
        [data-bs-theme="light"] {
            --bg-base:    #f6f8fa;
            --bg-surface: #ffffff;
            --bg-raised:  #f0f2f5;
            --border:     #d0d7de;
            --text:       #1f2328;
            --text-muted: #656d76;
            --accent:     #0969da;
        }

        body { background: var(--bg-base); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; transition: background .2s, color .2s; }

        .navbar-brand { font-weight: 700; font-size: 1.2rem; letter-spacing: .5px; }
        .navbar { background: var(--bg-surface) !important; border-bottom: 1px solid var(--border); }

        .card {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 10px;
        }

        .stat-icon { font-size: 2rem; }
        .stat-value { font-size: 2rem; font-weight: 700; line-height: 1; }

        .chart-wrap { position: relative; height: 220px; }

        .table { color: var(--text); --bs-table-bg: transparent; }
        .table thead th {
            background: var(--bg-raised);
            border-color: var(--border);
            color: var(--text-muted);
            font-size: .75rem;
            text-transform: uppercase;
            letter-spacing: .6px;
        }
        .table tbody tr { border-color: var(--border); }
        .table tbody tr:hover { background: var(--bg-raised); }
        .table td { vertical-align: middle; font-size: .85rem; }

        .form-control, .form-select {
            background: var(--bg-raised);
            border-color: var(--border);
            color: var(--text);
            font-size: .85rem;
        }
        .form-control:focus, .form-select:focus {
            background: var(--bg-raised);
            color: var(--text);
            border-color: var(--accent);
            box-shadow: 0 0 0 .2rem rgba(88,166,255,.2);
        }
        .form-control::placeholder { color: var(--text-muted); }
        .form-select option { background: var(--bg-raised); }

        /* Level badges */
        .badge-DEBUG { background: #6c757d !important; }
        .badge-INFO  { background: #1f6feb !important; }
        .badge-WARN  { background: #d29922 !important; color: #fff !important; }
        .badge-ERROR { background: #da3633 !important; }

        .pagination .page-link {
            background: var(--bg-raised);
            border-color: var(--border);
            color: var(--accent);
        }
        .pagination .page-link:hover { background: var(--border); }
        .pagination .page-item.active .page-link { background: #1f6feb; border-color: #1f6feb; color: #fff; }
        .pagination .page-item.disabled .page-link { background: var(--bg-raised); color: var(--text-muted); }

        .btn-outline-secondary {
            border-color: var(--border);
            color: var(--text-muted);
        }
        .btn-outline-secondary:hover { background: var(--bg-raised); color: var(--text); }

        .msg-cell { max-width: 420px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .demo-btn { font-size: .8rem; }

        /* Theme toggle */
        .theme-toggle { display: flex; align-items: center; gap: 6px; cursor: pointer; }
        .theme-toggle .form-check-input { cursor: pointer; width: 2.4em; height: 1.3em; }
        .theme-icon { font-size: 1rem; width: 16px; text-align: center; }

        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
        .live-dot { display:inline-block; width:8px; height:8px; border-radius:50%; background:#3fb950; animation: pulse 2s infinite; }

        /* ── Widget grid ────────────────────────────── */
        .widget-col { position: relative; }

        .btn-remove-widget {
            position: absolute;
            top: 10px;
            right: 12px;
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 0 4px;
            border-radius: 4px;
            font-size: .95rem;
            line-height: 1;
            z-index: 2;
            opacity: 0;
            transition: opacity .15s, background .15s;
        }
        .widget-col:hover .btn-remove-widget { opacity: 1; }
        .btn-remove-widget:hover { background: rgba(218,54,51,.15); color: #da3633; }

        /* ── Add-widget modal ───────────────────────── */
        .modal-content {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            color: var(--text);
        }
        .modal-header { border-bottom: 1px solid var(--border); }
        .modal-footer { border-top: 1px solid var(--border); }

        .widget-type-card {
            cursor: pointer;
            border: 2px solid var(--border);
            border-radius: 8px;
            padding: 14px 10px;
            text-align: center;
            transition: border-color .15s, background .15s, transform .1s;
            background: var(--bg-raised);
        }
        .widget-type-card:hover {
            border-color: var(--accent);
            background: var(--bg-surface);
            transform: translateY(-2px);
        }
        .widget-type-card i { font-size: 1.5rem; }
        .widget-type-card .wt-label { font-size: .78rem; font-weight: 600; margin-top: 6px; }
        .widget-type-card .wt-desc  { font-size: .7rem;  color: var(--text-muted); margin-top: 2px; }

        #widget-grid .card { min-height: 90px; }
        #widget-empty { display: none; }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar px-3 mb-4">
    <span class="navbar-brand">
        <i class="bi bi-activity me-2 text-info"></i>Log Analyzer
    </span>
    <div class="d-flex align-items-center gap-3 flex-wrap">
        <span class="live-dot"></span>
        <span class="text-muted small">Live</span>

        <!-- Add widget -->
        <button class="btn btn-sm btn-primary" data-bs-toggle="modal" data-bs-target="#addWidgetModal"
                style="font-size:.8rem;">
            <i class="bi bi-plus-lg me-1"></i>Add Widget
        </button>

        <!-- Theme toggle -->
        <label class="theme-toggle mb-0" title="Toggle light/dark theme">
            <i class="bi bi-moon-stars-fill theme-icon" id="themeIconMoon"></i>
            <div class="form-check form-switch mb-0">
                <input class="form-check-input" type="checkbox" id="themeToggle" onchange="toggleTheme(this)"/>
            </div>
            <i class="bi bi-sun-fill theme-icon text-warning" id="themeIconSun"></i>
        </label>

        <button class="btn btn-sm btn-outline-secondary demo-btn"
                onclick="generateDemoLogs()"
                title="Generate 50 sample log entries via Kafka">
            <i class="bi bi-lightning-charge me-1"></i>Generate Demo Logs
        </button>

        <!-- User info + logout -->
        <div class="d-flex align-items-center gap-2">
            <i class="bi bi-person-circle text-muted"></i>
            <span class="text-muted small" sec:authentication="name">user@example.com</span>
            <form th:action="@{/logout}" method="post" class="mb-0">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-sm btn-outline-danger" style="font-size:.75rem; padding:2px 8px;">
                    <i class="bi bi-box-arrow-right me-1"></i>Sign out
                </button>
            </form>
        </div>
    </div>
</nav>

<div class="container-fluid px-4">

    <!-- ── Dynamic Widget Grid ── -->
    <div id="widget-grid" class="row g-3 mb-4">
        <!-- Populated by JavaScript -->
    </div>
    <div id="widget-empty" class="text-center text-muted py-5 mb-4">
        <i class="bi bi-grid fs-1 d-block mb-2 opacity-50"></i>
        <p class="mb-2">No widgets yet.</p>
        <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#addWidgetModal">
            <i class="bi bi-plus-lg me-1"></i>Add your first widget
        </button>
    </div>

    <!-- ── Log table ── -->
    <div class="card p-3 mb-4">

        <!-- Filter form -->
        <form method="get" th:action="@{/}" class="row g-2 mb-3 align-items-end">
            <div class="col-6 col-md-2">
                <label class="form-label text-muted small mb-1">Level</label>
                <select name="level" class="form-select form-select-sm">
                    <option value="">All Levels</option>
                    <option value="DEBUG" th:selected="${filter.level == 'DEBUG'}">DEBUG</option>
                    <option value="INFO"  th:selected="${filter.level == 'INFO'}">INFO</option>
                    <option value="WARN"  th:selected="${filter.level == 'WARN'}">WARN</option>
                    <option value="ERROR" th:selected="${filter.level == 'ERROR'}">ERROR</option>
                </select>
            </div>
            <div class="col-6 col-md-2">
                <label class="form-label text-muted small mb-1">Service</label>
                <input type="text" name="service" class="form-control form-control-sm"
                       placeholder="e.g. auth-service" th:value="${filter.service}"/>
            </div>
            <div class="col-6 col-md-2">
                <label class="form-label text-muted small mb-1">From</label>
                <input type="datetime-local" name="from" class="form-control form-control-sm"
                       th:value="${filter.from}"/>
            </div>
            <div class="col-6 col-md-2">
                <label class="form-label text-muted small mb-1">To</label>
                <input type="datetime-local" name="to" class="form-control form-control-sm"
                       th:value="${filter.to}"/>
            </div>
            <div class="col-md-3">
                <label class="form-label text-muted small mb-1">Search message</label>
                <input type="text" name="q" class="form-control form-control-sm"
                       placeholder="Full-text search..." th:value="${filter.q}"/>
            </div>
            <div class="col-6 col-md-1">
                <button type="submit" class="btn btn-primary btn-sm w-100">
                    <i class="bi bi-search"></i>
                </button>
            </div>
            <div class="col-6 col-md-auto" th:if="${filter.level != null and filter.level != ''
                                                  or filter.service != null and filter.service != ''
                                                  or filter.from != null and filter.from != ''
                                                  or filter.to != null and filter.to != ''
                                                  or filter.q != null and filter.q != ''}">
                <a th:href="@{/}" class="btn btn-outline-secondary btn-sm w-100">
                    <i class="bi bi-x-lg"></i> Clear
                </a>
            </div>
        </form>

        <!-- Result count -->
        <div class="text-muted small mb-2">
            <span th:text="${logs.totalElements}">0</span> entries found
            <span th:if="${logs.totalPages > 1}"
                  th:text="' — page ' + (${logs.number + 1}) + ' of ' + ${logs.totalPages}"></span>
        </div>

        <!-- Table -->
        <div class="table-responsive">
            <table class="table table-sm mb-0">
                <thead>
                <tr>
                    <th style="width:155px">Timestamp (UTC)</th>
                    <th style="width:75px">Level</th>
                    <th style="width:150px">Service</th>
                    <th>Message</th>
                    <th style="width:140px">Trace ID</th>
                    <th style="width:90px">Host</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${logs.empty}">
                    <td colspan="6" class="text-center text-muted py-5">
                        <i class="bi bi-inbox fs-1 d-block mb-2"></i>
                        No logs match the current filters
                    </td>
                </tr>
                <tr th:each="log : ${logs.content}">
                    <td class="text-nowrap font-monospace small"
                        th:text="${log.formattedTimestamp}"></td>
                    <td>
                        <span class="badge"
                              th:classappend="'badge-' + ${log.level.name()}"
                              th:text="${log.level.name()}"></span>
                    </td>
                    <td class="small" th:text="${log.serviceName}"></td>
                    <td class="msg-cell" th:text="${log.message}" th:title="${log.message}"></td>
                    <td class="small text-muted font-monospace" th:text="${log.traceId}"></td>
                    <td class="small text-muted" th:text="${log.host}"></td>
                </tr>
                </tbody>
            </table>
        </div>

        <!-- Pagination -->
        <nav th:if="${logs.totalPages > 1}" class="mt-3 d-flex justify-content-center">
            <ul class="pagination pagination-sm mb-0">
                <li class="page-item" th:classappend="${logs.first} ? 'disabled'">
                    <a class="page-link"
                       th:href="@{/(level=${filter.level},service=${filter.service},from=${filter.from},to=${filter.to},q=${filter.q},page=${logs.number - 1})}">
                        <i class="bi bi-chevron-left"></i>
                    </a>
                </li>
                <th:block th:each="i : ${#numbers.sequence(
                        T(java.lang.Math).max(0, logs.number - 3),
                        T(java.lang.Math).min(logs.totalPages - 1, logs.number + 3))}">
                    <li class="page-item" th:classappend="${i == logs.number} ? 'active'">
                        <a class="page-link"
                           th:href="@{/(level=${filter.level},service=${filter.service},from=${filter.from},to=${filter.to},q=${filter.q},page=${i})}"
                           th:text="${i + 1}"></a>
                    </li>
                </th:block>
                <li class="page-item" th:classappend="${logs.last} ? 'disabled'">
                    <a class="page-link"
                       th:href="@{/(level=${filter.level},service=${filter.service},from=${filter.from},to=${filter.to},q=${filter.q},page=${logs.number + 1})}">
                        <i class="bi bi-chevron-right"></i>
                    </a>
                </li>
            </ul>
        </nav>
    </div>
</div>

<!-- ── Add Widget Modal ─────────────────────────────────────────── -->
<div class="modal fade" id="addWidgetModal" tabindex="-1" aria-labelledby="addWidgetModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="addWidgetModalLabel">
                    <i class="bi bi-grid me-2"></i>Add Widget
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"
                        style="filter: var(--btn-close-filter, none);"></button>
            </div>
            <div class="modal-body">
                <div class="row g-2" id="widgetTypeGrid">
                    <!-- Populated by JS -->
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>

<script>
    // ── Theme helpers ────────────────────────────────────────────────
    function isDark() {
        return document.documentElement.getAttribute('data-bs-theme') === 'dark';
    }

    function chartColors() {
        const dark = isDark();
        return {
            grid:     dark ? '#21262d' : '#e8ecef',
            tick:     dark ? '#8b949e' : '#656d76',
            legend:   dark ? '#8b949e' : '#656d76',
            border:   dark ? '#161b22' : '#ffffff',
            line:     dark ? '#58a6ff' : '#0969da',
            lineFill: dark ? 'rgba(88,166,255,0.08)' : 'rgba(9,105,218,0.08)',
        };
    }

    // Map: widgetId → Chart instance
    const chartInstances = new Map();

    function applyAllChartThemes() {
        const c = chartColors();
        chartInstances.forEach(chart => {
            if (!chart) return;
            if (chart.options.plugins?.legend?.labels) {
                chart.options.plugins.legend.labels.color = c.legend;
            }
            if (chart.options.scales) {
                Object.values(chart.options.scales).forEach(axis => {
                    if (axis.ticks) axis.ticks.color = c.tick;
                    if (axis.grid)  axis.grid.color  = c.grid;
                });
            }
            // Update dataset colors for line charts
            const ds = chart.data.datasets[0];
            if (ds && chart.config.type === 'line') {
                ds.borderColor     = c.line;
                ds.backgroundColor = c.lineFill;
            }
            // Update doughnut border color
            if (chart.config.type === 'doughnut' && ds) {
                ds.borderColor = c.border;
            }
            chart.update();
        });
    }

    function toggleTheme(checkbox) {
        const theme = checkbox.checked ? 'light' : 'dark';
        document.documentElement.setAttribute('data-bs-theme', theme);
        localStorage.setItem('la-theme', theme);
        applyAllChartThemes();
    }

    window.addEventListener('DOMContentLoaded', () => {
        document.getElementById('themeToggle').checked = !isDark();
        initAddWidgetModal();
        loadDashboard();
    });

    // ── Widget definitions ───────────────────────────────────────────
    const WIDGET_DEFS = {
        STAT_TOTAL:      { label: 'Total Logs',    icon: 'bi-layers',              desc: 'Total log entries count',      colClass: 'col-md-3' },
        STAT_ERRORS:     { label: 'Error Count',   icon: 'bi-x-circle',            desc: 'Number of ERROR level logs',   colClass: 'col-md-3' },
        STAT_WARNS:      { label: 'Warnings',      icon: 'bi-exclamation-triangle', desc: 'Number of WARN level logs',    colClass: 'col-md-3' },
        STAT_ERROR_RATE: { label: 'Error Rate',    icon: 'bi-graph-up-arrow',      desc: 'Error rate in the last hour',  colClass: 'col-md-3' },
        CHART_LEVEL:     { label: 'Level Chart',   icon: 'bi-pie-chart',           desc: 'Distribution by log level',    colClass: 'col-md-4' },
        CHART_TIMELINE:  { label: 'Timeline',      icon: 'bi-bar-chart-line',      desc: 'Log volume over last 24 h',    colClass: 'col-md-8' },
        CHART_SERVICES:  { label: 'Top Services',  icon: 'bi-diagram-3',           desc: 'Most active microservices',    colClass: 'col-md-6' },
        TABLE_RECENT:    { label: 'Recent Logs',   icon: 'bi-table',               desc: 'Last 10 log entries',          colClass: 'col-md-12' },
    };

    const SIZE_CLASS = { SMALL: 'col-md-3', MEDIUM: 'col-md-4', LARGE: 'col-md-8', FULL: 'col-md-12' };

    function colClass(widget) {
        return SIZE_CLASS[widget.size] || (WIDGET_DEFS[widget.type]?.colClass ?? 'col-md-6');
    }

    // ── Add-widget modal ─────────────────────────────────────────────
    function initAddWidgetModal() {
        const grid = document.getElementById('widgetTypeGrid');
        grid.innerHTML = Object.entries(WIDGET_DEFS).map(([type, def]) => `
            <div class="col-6 col-md-3">
                <div class="widget-type-card" onclick="addWidget('${type}')">
                    <i class="bi ${def.icon} text-primary"></i>
                    <div class="wt-label">${def.label}</div>
                    <div class="wt-desc">${def.desc}</div>
                </div>
            </div>
        `).join('');
    }

    // ── Dashboard load ───────────────────────────────────────────────
    async function loadDashboard() {
        const [metrics, widgets] = await Promise.all([
            fetch('/api/metrics/summary').then(r => r.json()),
            fetch('/api/widgets').then(r => r.json()),
        ]).catch(err => { console.error('Failed to load dashboard data', err); return [{}, []]; });

        renderAllWidgets(widgets, metrics);
    }

    function renderAllWidgets(widgets, metrics) {
        const grid = document.getElementById('widget-grid');
        const empty = document.getElementById('widget-empty');
        grid.innerHTML = '';

        if (!widgets || widgets.length === 0) {
            empty.style.display = 'block';
            return;
        }
        empty.style.display = 'none';

        for (const widget of widgets) {
            const col = buildWidgetShell(widget);
            grid.appendChild(col);
            renderWidgetContent(widget, metrics);
        }
    }

    function buildWidgetShell(widget) {
        const col = document.createElement('div');
        col.className = `${colClass(widget)} widget-col`;
        col.dataset.widgetId = widget.id;
        col.innerHTML = `
            <div class="card p-3 h-100 position-relative">
                <button class="btn-remove-widget" onclick="removeWidget(${widget.id})" title="Remove widget">
                    <i class="bi bi-x-lg"></i>
                </button>
                <div id="wc-${widget.id}">
                    <div class="text-center text-muted py-4">
                        <div class="spinner-border spinner-border-sm" role="status"></div>
                    </div>
                </div>
            </div>`;
        return col;
    }

    function renderWidgetContent(widget, metrics) {
        const el = document.getElementById(`wc-${widget.id}`);
        if (!el) return;

        switch (widget.type) {
            case 'STAT_TOTAL':
                renderStat(el, widget, metrics.totalLogs ?? 0, 'bi-layers', 'text-primary');
                break;
            case 'STAT_ERRORS':
                renderStat(el, widget, metrics.countByLevel?.ERROR ?? 0, 'bi-x-circle', 'text-danger');
                break;
            case 'STAT_WARNS':
                renderStat(el, widget, metrics.countByLevel?.WARN ?? 0, 'bi-exclamation-triangle', 'text-warning');
                break;
            case 'STAT_ERROR_RATE':
                renderStat(el, widget, (metrics.errorRate ?? 0).toFixed(1) + '%', 'bi-graph-up-arrow', 'text-info');
                break;
            case 'CHART_LEVEL':
                renderLevelChart(el, widget, metrics.countByLevel ?? {});
                break;
            case 'CHART_TIMELINE':
                renderTimelineChart(el, widget, metrics.timeSeriesData ?? []);
                break;
            case 'CHART_SERVICES':
                renderServicesChart(el, widget, metrics.topServices ?? []);
                break;
            case 'TABLE_RECENT':
                renderRecentTable(el, widget);
                break;
            default:
                el.innerHTML = `<div class="text-muted small">Unknown widget type: ${widget.type}</div>`;
        }
    }

    // ── Widget renderers ─────────────────────────────────────────────

    function renderStat(el, widget, value, icon, colorClass) {
        el.innerHTML = `
            <div class="d-flex align-items-center gap-3">
                <i class="bi ${icon} stat-icon ${colorClass}"></i>
                <div>
                    <div class="text-muted small mb-1">${widget.title}</div>
                    <div class="stat-value ${colorClass}">${value}</div>
                </div>
            </div>`;
    }

    function renderLevelChart(el, widget, countByLevel) {
        el.innerHTML = `
            <h6 class="mb-3 text-muted"><i class="bi bi-pie-chart me-1"></i>${widget.title}</h6>
            <div class="chart-wrap"><canvas id="cv-${widget.id}"></canvas></div>`;

        const LEVEL_COLORS = { DEBUG: '#6c757d', INFO: '#1f6feb', WARN: '#d29922', ERROR: '#da3633' };
        const labels = Object.keys(countByLevel);
        const values = Object.values(countByLevel);
        const colors = labels.map(l => LEVEL_COLORS[l] ?? '#6c757d');
        const c = chartColors();

        const chart = new Chart(document.getElementById(`cv-${widget.id}`), {
            type: 'doughnut',
            data: {
                labels,
                datasets: [{ data: values, backgroundColor: colors, borderColor: c.border, borderWidth: 3, hoverOffset: 6 }]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { legend: { position: 'bottom', labels: { color: c.legend, padding: 12, font: { size: 12 } } } }
            }
        });
        chartInstances.set(widget.id, chart);
    }

    function renderTimelineChart(el, widget, timeSeriesData) {
        el.innerHTML = `
            <h6 class="mb-3 text-muted"><i class="bi bi-bar-chart-line me-1"></i>${widget.title}</h6>
            <div class="chart-wrap"><canvas id="cv-${widget.id}"></canvas></div>`;

        const labels = timeSeriesData.map(p => p.label);
        const values = timeSeriesData.map(p => p.count);
        const c = chartColors();

        const chart = new Chart(document.getElementById(`cv-${widget.id}`), {
            type: 'line',
            data: {
                labels,
                datasets: [{
                    label: 'Log count', data: values,
                    borderColor: c.line, backgroundColor: c.lineFill,
                    fill: true, tension: 0.35, pointRadius: 3, pointHoverRadius: 5
                }]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                scales: {
                    x: { ticks: { maxTicksLimit: 12, font: { size: 11 }, color: c.tick }, grid: { color: c.grid } },
                    y: { beginAtZero: true, ticks: { precision: 0, font: { size: 11 }, color: c.tick }, grid: { color: c.grid } }
                },
                plugins: { legend: { display: false } }
            }
        });
        chartInstances.set(widget.id, chart);
    }

    function renderServicesChart(el, widget, topServices) {
        el.innerHTML = `
            <h6 class="mb-3 text-muted"><i class="bi bi-diagram-3 me-1"></i>${widget.title}</h6>
            <div class="chart-wrap"><canvas id="cv-${widget.id}"></canvas></div>`;

        const labels = (topServices || []).map(s => s.serviceName);
        const values = (topServices || []).map(s => s.count);
        const c = chartColors();

        const chart = new Chart(document.getElementById(`cv-${widget.id}`), {
            type: 'bar',
            data: {
                labels,
                datasets: [{
                    label: 'Log count', data: values,
                    backgroundColor: 'rgba(88,166,255,0.65)', borderColor: '#58a6ff', borderWidth: 1
                }]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                scales: {
                    x: { ticks: { color: c.tick }, grid: { color: c.grid } },
                    y: { beginAtZero: true, ticks: { precision: 0, color: c.tick }, grid: { color: c.grid } }
                },
                plugins: { legend: { display: false } }
            }
        });
        chartInstances.set(widget.id, chart);
    }

    async function renderRecentTable(el, widget) {
        el.innerHTML = `
            <h6 class="mb-3 text-muted"><i class="bi bi-table me-1"></i>${widget.title}</h6>
            <div class="text-center text-muted py-3"><div class="spinner-border spinner-border-sm"></div></div>`;

        const data = await fetch('/api/logs?size=10').then(r => r.json()).catch(() => ({ content: [] }));
        const logs  = data.content ?? [];

        const BADGE = { DEBUG: 'badge-DEBUG', INFO: 'badge-INFO', WARN: 'badge-WARN', ERROR: 'badge-ERROR' };
        const rows  = logs.length === 0
            ? '<tr><td colspan="4" class="text-center text-muted py-4"><i class="bi bi-inbox"></i> No logs found</td></tr>'
            : logs.map(log => `
                <tr>
                    <td class="small font-monospace text-nowrap">${log.formattedTimestamp ?? ''}</td>
                    <td><span class="badge ${BADGE[log.level] ?? 'badge-DEBUG'}">${log.level ?? ''}</span></td>
                    <td class="small">${log.serviceName ?? ''}</td>
                    <td class="small msg-cell" title="${escHtml(log.message ?? '')}">${escHtml(log.message ?? '')}</td>
                </tr>`).join('');

        el.innerHTML = `
            <h6 class="mb-2 text-muted"><i class="bi bi-table me-1"></i>${widget.title}</h6>
            <div class="table-responsive">
                <table class="table table-sm mb-0">
                    <thead><tr>
                        <th>Timestamp</th><th>Level</th><th>Service</th><th>Message</th>
                    </tr></thead>
                    <tbody>${rows}</tbody>
                </table>
            </div>`;
    }

    function escHtml(str) {
        return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ── Add / Remove widget ──────────────────────────────────────────

    async function addWidget(type) {
        const res = await fetch('/api/widgets', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ type }),
        });
        if (!res.ok) { console.error('Failed to add widget'); return; }

        const widget  = await res.json();
        const metrics = await fetch('/api/metrics/summary').then(r => r.json()).catch(() => ({}));

        const grid  = document.getElementById('widget-grid');
        const empty = document.getElementById('widget-empty');
        empty.style.display = 'none';

        const col = buildWidgetShell(widget);
        grid.appendChild(col);
        renderWidgetContent(widget, metrics);

        bootstrap.Modal.getInstance(document.getElementById('addWidgetModal'))?.hide();
    }

    async function removeWidget(id) {
        await fetch(`/api/widgets/${id}`, { method: 'DELETE' });

        document.querySelector(`[data-widget-id="${id}"]`)?.remove();
        chartInstances.get(id)?.destroy();
        chartInstances.delete(id);

        const grid = document.getElementById('widget-grid');
        if (grid.children.length === 0) {
            document.getElementById('widget-empty').style.display = 'block';
        }
    }

    // ── Demo generator ───────────────────────────────────────────────
    function generateDemoLogs() {
        fetch('/api/demo/generate?count=50', { method: 'POST' })
            .then(r => r.json())
            .then(data => { console.log(data.message); setTimeout(() => location.reload(), 1200); })
            .catch(err => console.error('Demo generation failed', err));
    }
</script>
</body>
